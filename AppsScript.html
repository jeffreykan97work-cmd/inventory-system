<!doctype html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>紀念品倉存管理系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#f0f4f8;color:#1a2a3a}
.hdr{background:linear-gradient(135deg,#1a3d5c,#2c5a8a);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:18px}.hdr span{font-size:11px;opacity:.7}
.ctn{max-width:900px;margin:0 auto;padding:16px}
.tabs{display:flex;margin-bottom:16px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#6a7a8a;border:none;background:none}
.tab.on{color:#fff;background:#2c5a8a}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.05);margin-bottom:14px}
h2{font-size:15px;margin-bottom:12px;color:#1a3d5c}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;color:#6a7a8a;margin-bottom:4px;font-weight:600}
.fld input,.fld select{width:100%;padding:10px 12px;border:1px solid #d0d8e0;border-radius:8px;font-size:14px}
.item-row{display:flex;gap:8px;align-items:center;padding:8px 10px;background:#f7f9fc;border-radius:8px;margin-bottom:6px}
.item-row select{flex:1;min-width:0;padding:8px;border:1px solid #d0d8e0;border-radius:6px;font-size:13px}
.item-row input{width:65px;padding:8px;border:1px solid #d0d8e0;border-radius:6px;font-size:13px;text-align:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:#2c5a8a;color:#fff;width:100%}.btn-p:hover{background:#1a3d5c}
.btn-o{background:#fff;color:#2c5a8a;border:2px solid #2c5a8a}
.btn-x{background:none;color:#c44;font-size:11px;padding:2px 6px}
.btn-s{padding:6px 14px;font-size:12px}
.btn-g{background:#2a8a4a;color:#fff;padding:5px 12px;font-size:11px;border-radius:6px;border:none;cursor:pointer}
.btn-r{background:#c44;color:#fff;padding:5px 12px;font-size:11px;border-radius:6px;border:none;cursor:pointer}
.loading{text-align:center;color:#aaa;padding:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;font-size:10px;color:#6a7a8a;font-weight:700;border-bottom:2px solid #e0e8f0}
td{padding:8px 6px;border-bottom:1px solid #e8ecf2}
.low{color:#c44;font-weight:700}.ok{color:#2a8a4a}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-pending{background:#fff3cd;color:#856404}
.badge-ok{background:#d4edda;color:#155724}
.badge-no{background:#f8d7da;color:#721c24}
/* Catalog grid */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.cat-item{background:#f7f9fc;border-radius:10px;padding:12px;text-align:center;border:1px solid #e0e8f0}
.cat-item img{width:100%;height:160px;object-fit:contain;border-radius:8px;background:#fff;margin-bottom:8px}
.cat-item .cname{font-size:13px;font-weight:600;color:#1a3d5c}
.cat-item .cnoimg{width:100%;height:160px;display:flex;align-items:center;justify-content:center;background:#e8ecf2;border-radius:8px;color:#aaa;font-size:12px}
/* Login modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:99;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#fff;padding:24px;border-radius:12px;width:320px;text-align:center}
.modal-box input{width:100%;padding:10px;border:1px solid #d0d8e0;border-radius:8px;margin:10px 0;font-size:14px}
.login-link{font-size:11px;color:#2c5a8a;cursor:pointer;text-decoration:underline;margin-left:10px}
</style>
</head>
<body>
<div class="hdr"><h1>📦 紀念品申請系統</h1><span id="role-label">澳門地球物理氣象局</span><span class="login-link" onclick="showLogin()">🔒 主管登入</span></div>
<div class="ctn">
<div class="tabs" id="tabs">
  <button class="tab on" onclick="tab('apply')">📝 申請物品</button>
  <button class="tab" onclick="tab('catalog')">📷 紀念品目錄</button>
</div>

<!-- PUBLIC: Apply -->
<div id="p-apply" class="card">
  <h2>物品申請表</h2>
  <div class="fld"><label>申請人 *</label><input id="applicant" placeholder="姓名"/></div>
  <div class="fld"><label>部門 *</label><input id="department" placeholder="部門"/></div>
  <div class="fld"><label>分類 *</label>
    <select id="category"><option value="">選擇分類</option>
      <option>參觀</option><option>親子遊</option><option>致送嘉賓、單位</option>
      <option>交流會、會議</option><option>人員退休、紀念</option>
      <option>其他宣傳活動</option><option>滿意度調查</option><option>宣傳品存入</option><option>其他</option>
    </select>
  </div>
  <div class="fld"><label>事由 *</label><input id="reason" placeholder="簡述原因"/></div>
  <div style="font-size:12px;color:#6a7a8a;margin:12px 0 6px;font-weight:600">申請物品</div>
  <div id="items"></div>
  <button class="btn btn-o btn-s" onclick="addRow()">+ 新增物品</button>
  <div style="margin-top:16px"><button class="btn btn-p" onclick="submit()">📤 提交申請（需主管審批）</button></div>
  <div id="result" style="margin-top:10px;text-align:center;font-size:14px"></div>
</div>

<!-- PUBLIC: Catalog -->
<div id="p-catalog" class="card" style="display:none">
  <h2>紀念品目錄</h2>
  <div id="cat-grid" class="cat-grid"><div class="loading">載入中…</div></div>
</div>

<!-- SUPERVISOR: Stock (hidden by default) -->
<div id="p-stock" class="card" style="display:none"><h2>📊 庫存總覽</h2><table><thead><tr><th>物品</th><th>庫存</th><th>安全</th><th>狀態</th><th>操作</th></tr></thead><tbody id="stock-tbl"></tbody></table></div>

<!-- SUPERVISOR: Approvals -->
<div id="p-approvals" class="card" style="display:none"><h2>📋 待審批</h2><table><thead><tr><th>編號</th><th>日期</th><th>申請人</th><th>部門</th><th>物品</th><th>狀態</th><th>操作</th></tr></thead><tbody id="ap-tbl"></tbody></table></div>

<!-- LOGIN MODAL -->
<div id="login-modal" class="modal">
  <div class="modal-box">
    <h3>🔒 主管登入</h3>
    <input id="pwd" type="password" placeholder="請輸入主管密碼"/>
    <br><button class="btn btn-p" onclick="doLogin()">登入</button>
    <br><span style="font-size:11px;color:#888;display:block;margin-top:8px">預設密碼請到「系統設定」sheet 設定</span>
  </div>
</div>
</div>

<script>
var catalog=[], supervisor=false;

google.script.run.withSuccessHandler(function(d){catalog=d;renderItems();renderCat();}).getCatalog();

function renderItems(){
  var opts=catalog.map(function(it,i){return '<option value="'+i+'">'+it.name+'</option>';}).join('');
  document.getElementById('items').innerHTML='<div class="item-row">'+
    '<select><option value="">選擇物品…</option>'+opts+'</select>'+
    '<input type="number" value="1" min="1">'+
    '<button class="btn btn-x" onclick="this.parentElement.remove()">✕</button></div>';
}
function addRow(){
  var opts=catalog.map(function(it,i){return '<option value="'+i+'">'+it.name+'</option>';}).join('');
  var d=document.createElement('div');d.className='item-row';
  d.innerHTML='<select><option value="">選擇物品…</option>'+opts+'</select>'+
    '<input type="number" value="1" min="1"><button class="btn btn-x" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('items').appendChild(d);
}
function renderCat(){
  var g=document.getElementById('cat-grid');
  if(!catalog.length){g.innerHTML='<div class="loading">暫無紀念品資料</div>';return;}
  g.innerHTML=catalog.map(function(it){
    if(it.image) return '<div class="cat-item"><img src="'+it.image+'" onerror="this.parentElement.querySelector(\'.cnoimg\').style.display=\'flex\';this.style.display=\'none\'"/><div class="cnoimg" style="display:none">📷</div><div class="cname">'+it.name+'</div></div>';
    return '<div class="cat-item"><div class="cnoimg">📷 暫無圖片</div><div class="cname">'+it.name+'</div></div>';
  }).join('');
}
function submit(){
  var a=document.getElementById('applicant').value.trim();
  var d=document.getElementById('department').value.trim();
  var c=document.getElementById('category').value;
  var r=document.getElementById('reason').value.trim();
  if(!a||!d||!c||!r)return alert('請填寫所有必填欄位');
  var its=[];
  document.querySelectorAll('#items .item-row').forEach(function(row){
    var sel=row.querySelector('select'),qty=row.querySelector('input');
    if(sel.value!=='')its.push({name:catalog[sel.value].name,qty:parseInt(qty.value)||1});
  });
  if(!its.length)return alert('請至少選擇一個物品');
  document.getElementById('result').innerHTML='⏳ 提交中…';
  google.script.run.withSuccessHandler(function(j){
    document.getElementById('result').innerHTML='✅ '+j.message;
    setTimeout(function(){location.reload();},2000);
  }).submitApplication({applicant:a,department:d,category:c,reason:r,items:its});
}
function tab(t){
  document.querySelectorAll('#tabs .tab').forEach(function(b){b.classList.remove('on');});
  event.target.classList.add('on');
  document.getElementById('p-apply').style.display=t==='apply'?'':'none';
  document.getElementById('p-catalog').style.display=t==='catalog'?'':'none';
  if(supervisor){document.getElementById('p-stock').style.display=t==='stock'?'':'none';document.getElementById('p-approvals').style.display=t==='approvals'?'':'none';}
}

// ── Supervisor ──
function showLogin(){document.getElementById('login-modal').classList.add('show');}
function doLogin(){
  var p=document.getElementById('pwd').value;
  google.script.run.withSuccessHandler(function(ok){
    if(ok){ supervisor=true; document.getElementById('login-modal').classList.remove('show'); document.getElementById('role-label').textContent='🔓 主管模式';
      document.getElementById('tabs').innerHTML='<button class=\"tab on\" onclick=\"tab(\\'apply\\')\">📝 申請</button><button class=\"tab\" onclick=\"tab(\\'catalog\\')\">📷 目錄</button><button class=\"tab\" onclick=\"tab(\\'stock\\')\">📊 庫存</button><button class=\"tab\" onclick=\"tab(\\'approvals\\')\">📋 審批</button>';
      loadSupervisor(); }
    else alert('密碼錯誤');
  }).supervisorLogin(p);
}
function loadSupervisor(){
  google.script.run.withSuccessHandler(function(d){renderStockTable(d);}).getStock();
  google.script.run.withSuccessHandler(renderApprovals).getApprovals();
}
function renderStockTable(items){
  document.getElementById('stock-tbl').innerHTML=items.map(function(it,i){
    return '<tr><td><strong>'+it.name+'</strong></td><td>'+it.stock+'</td><td>'+it.safe+'</td>'+
      '<td class="'+(it.stock<=it.safe?'low':'ok')+'">'+(it.stock<=it.safe?'⚠️ 低':'✅ 正常')+'</td>'+
      '<td><input type="number" id="stk-'+i+'" value="'+it.stock+'" style="width:60px;padding:4px"/> '+
      '<button class="btn btn-s btn-p" onclick="saveStk(\''+it.name+'\','+i+')">更新</button></td></tr>';
  }).join('');
}
function saveStk(name,i){
  var v=document.getElementById('stk-'+i).value;
  google.script.run.withSuccessHandler(function(r){alert(r.message);loadSupervisor();}).updateStock(name,v);
}
function renderApprovals(apps){
  document.getElementById('ap-tbl').innerHTML=apps.map(function(a){
    var badge=a.status==='待審批'?'badge-pending':a.status==='已通過'?'badge-ok':'badge-no';
    var btns=a.status==='待審批'?'<button class="btn btn-g" onclick="act(\''+a.id+'\',\'approve\')">✓通過</button> <button class="btn btn-r" onclick="act(\''+a.id+'\',\'reject\')">✕拒絕</button>':'';
    return '<tr><td>'+a.id+'</td><td>'+a.date+'</td><td>'+a.applicant+'</td><td>'+a.department+'</td><td>'+a.items+'</td><td><span class="badge '+badge+'">'+a.status+'</span></td><td>'+btns+'</td></tr>';
  }).join('');
}
function act(id,action){
  var approver=prompt('審批人姓名:');
  if(!approver)return;
  google.script.run.withSuccessHandler(function(r){alert(r.message);loadSupervisor();}).approveApp(id,action,approver);
}
</script>
</body>
</html>
